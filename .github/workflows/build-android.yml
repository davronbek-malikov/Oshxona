name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
  workflow_dispatch: # also allow manual trigger

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Generate assets
        working-directory: mobile
        run: node scripts/generate-assets.js

      - name: Create env file
        working-directory: mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" >> .env

      - name: Prebuild Android
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: oshxona-android
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
